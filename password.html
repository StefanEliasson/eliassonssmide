<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Privat släktforskning</title>
</head>
<body>
<h2>Privat släktforskning</h2>
<p>Skriv lösenord för att fortsätta:</p>

<input type="password" id="pw">
<button onclick="check()">Logga in</button>

<script>
function check() {
    const correct = "Stefan";  // byt till ditt eget
    const entered = document.getElementById("pw").value;

    if (entered === correct) {
        window.location.href = "./Disgen/000/000/001.htm";
    } else {
        alert("Fel lösenord");
    }
}
</script>

</body>
</html>
